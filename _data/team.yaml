- name: Richard M. Rossow
  title: Senior Adviser and Wadhwani Chair in U.S.-India Policy Studies
  image: "/uploads/headshots/rick-rossow-headshot.jpg"
  current: true
  bio: Richard Rossow is a senior adviser and holds the Wadhwani Chair in U.S.-India Policy Studies at CSIS. In this role he helps frame and shape policies to promote greater business and economic engagement between the two countries.
- name: Kartikeya Singh, Ph.D.
  title: Deputy Director and Fellow
  image: "/uploads/headshots/kartikeya-singh-headshot.jpg"
  current: true
  bio: At CSIS, Dr. Singh is charged with leading the Wadhwani Chair’s work on India’s states, including a new project on energy. Prior to joining CSIS, he worked at the U.S. Department of Energy supporting and managing U.S.-India and U.S.-Pakistan bilateral energy cooperation.
- name: Aman Thakker
  title: Research Associate
  image: "/aman-thakker-headshot.jpg"
  current: true
  bio: Aman Thakker is a Research Associate at the Wadhwani Chair in U.S. - India Policy Studies at CSIS. His research areas include India's economic reforms, security dynamics in the Indo-Pacific, and Indian domestic politics. Aman is also a Contributor for The Diplomat, providing analysis on domestic politics, law, regulatory policy, and economics in India. He previously worked as a strategy consultant at Protagonist (formerly Monitor 360), based in Washington D.C.
- name: Afeena Ashfaque
  title: Program Coordinator and Research Assistant
  image: "/afeena-ashfaque-headshot.jpg"
  current: true
  bio: Afeena Ashfaque is a program coordinator and research assistant with the Wadhwani Chair in U.S.-India Policy Studies at CSIS. Her research focuses on Indian domestic policy, particularly the role played by India’s states in setting policy and driving development. She is responsible for administration of the U.S.-India State and Urban Initiative, the chair’s first-of-its-kind effort to build subnational partnerships to drive energy development in India and the United States. Previously, she worked on facilitating bilateral trade in agriculture between India and South Africa while working at the South African High Commission in New Delhi, India.
